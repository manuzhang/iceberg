name: "Java CI"
on:
  push:
    branches:
    - 'main'
    - 'dev'
    - '0.*'
    - '1.*'
    - '2.*'
    tags:
    - 'apache-iceberg-**'
  pull_request:
    paths-ignore:
    - '.github/ISSUE_TEMPLATE/**'
    - '.github/workflows/api-binary-compatibility.yml'
    - '.github/workflows/delta-conversion-ci.yml'
    - '.github/workflows/docs-ci.yml'
    - '.github/workflows/flink-ci.yml'
    - '.github/workflows/hive-ci.yml'
    - '.github/workflows/jmh-benchmarks-ci.yml'
    - '.github/workflows/kafka-connect-ci.yml'
    - '.github/workflows/labeler.yml'
    - '.github/workflows/license-check.yml'
    - '.github/workflows/open-api.yml'
    - '.github/workflows/publish-snapshot.yml'
    - '.github/workflows/recurring-jmh-benchmarks.yml'
    - '.github/workflows/site-ci.yml'
    - '.github/workflows/spark-ci.yml'
    - '.github/workflows/stale.yml'
    - '.gitignore'
    - '.asf.yaml'
    - 'dev/**'
    - 'docker/**'
    - 'docs/**'
    - 'site/**'
    - 'format/**'
    - '.gitattributes'
    - '**/README.md'
    - 'CONTRIBUTING.md'
    - '**/LICENSE'
    - '**/NOTICE'
    - 'doap.rdf'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  core-tests:
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 15
      matrix:
        jvm: [17, 21]
    env:
      SPARK_LOCAL_IP: localhost
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ matrix.jvm }}
    - uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: ${{ runner.os }}-gradle-
    - run: echo -e "$(ip addr show eth0 | grep "inet\b" | awk '{print $2}' | cut -d/ -f1)\t$(hostname -f) $(hostname -s)" | sudo tee -a /etc/hosts
    - run: ./gradlew check jacocoRootReport -DsparkVersions= -DflinkVersions= -DkafkaVersions= -Pquick=true -x javadoc
      if: matrix.jvm == 17
    - run: ./gradlew check -DsparkVersions= -DflinkVersions= -DkafkaVersions= -Pquick=true -x javadoc
      if: matrix.jvm != 17
    - name: Coverage summary
      if: matrix.jvm == 17
      run: |
        python3 - <<'EOF'
        import re, os, sys
        import xml.etree.ElementTree as ET

        xml_path = './build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml'
        try:
            with open(xml_path) as f:
                content = f.read()
        except FileNotFoundError:
            print(f'Coverage report not found: {xml_path}', file=sys.stderr)
            sys.exit(0)

        # Strip DOCTYPE to prevent external DTD fetch
        content = re.sub(r'<!DOCTYPE[^>]*>', '', content)
        root = ET.fromstring(content)

        # Use only direct children of root <report> for aggregate totals
        counters = {c.get('type'): (int(c.get('missed')), int(c.get('covered')))
                    for c in root.findall('counter')}

        order = ['INSTRUCTION', 'BRANCH', 'LINE', 'METHOD', 'CLASS']
        lines = ['## JaCoCo Coverage\n', '| Type | Covered | Total | Coverage |',
                 '|------|---------|-------|----------|']
        for t in order:
            if t in counters:
                missed, covered = counters[t]
                total = missed + covered
                pct = covered / total * 100 if total else 0
                lines.append(f'| {t} | {covered:,} | {total:,} | {pct:.1f}% |')

        summary = '\n'.join(lines) + '\n'
        print(summary)
        summary_file = os.environ.get('GITHUB_STEP_SUMMARY')
        if summary_file:
            with open(summary_file, 'a') as f:
                f.write(summary)
        EOF
    - uses: codecov/codecov-action@v5
      if: matrix.jvm == 17
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml
        flags: java
        name: java-jdk17
        fail_ci_if_error: false
    - uses: actions/upload-artifact@v7
      if: matrix.jvm == 17
      with:
        name: jacoco-report
        path: build/reports/jacoco/jacocoRootReport/
    - uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: test logs
        path: |
          **/build/testlogs

  build-checks:
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 15
      matrix:
        jvm: [17, 21]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ matrix.jvm }}
    - run: ./gradlew -DallModules build -x test -x javadoc -x integrationTest

  build-javadoc:
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 15
      matrix:
        jvm: [17, 21]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: ${{ matrix.jvm }}
    - run: ./gradlew -Pquick=true javadoc
