name: "Delete Merged or Stale Branches"
on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  # All other permissions are set to none
  contents: write

jobs:
  delete-merged-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged and stale branches
        uses: phpdocker-io/github-actions-delete-abandoned-branches@v2.0.3
        with:
          github_token: ${{ github.token }}
          last_commit_age_days: 90
          ignore_branches: main,0.14.x,0.15.x,1.0.x,1.1.x,1.2.x,1.3.x,1.4.x,1.5.x,1.6.x,1.7.x
          dry_run: 'no'
